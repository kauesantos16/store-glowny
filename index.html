<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glowny — Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f7f5;--surface:#fff;--surface2:#f2f1ee;
  --border:#e6e4df;--text:#1c1b18;--muted:#8a8880;
  --pink:#e8327a;--pink-soft:#fdf0f5;--pink-bd:#f5c0d6;
  --radius:12px;--pill:100px;--topbar:52px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}

/* TOPBAR */
.tb{height:var(--topbar);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:10;}
.tb-logo{font-family:'DM Serif Display',serif;font-size:18px;letter-spacing:-.2px;display:flex;align-items:center;gap:7px;}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--pink);}
.tb-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;background:var(--surface2);border-radius:var(--pill);color:var(--muted);}
.tb-sp{flex:1;}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding:3px 10px;border-radius:var(--pill);}
.badge.saved{color:#16a34a;}.badge.dirty{color:var(--pink);}
.btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:var(--pill);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--pink);color:var(--pink);background:var(--pink-soft);}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:var(--pink);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}

/* LAYOUT */
.layout{flex:1;display:grid;grid-template-columns:220px 1fr 268px;overflow:hidden;}

/* LEFT PANEL */
.pl{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:10px 0 16px;}
.pl-section{padding:14px 14px 6px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.blk-btn{margin:2px 10px;padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;border:1.5px solid transparent;transition:all .15s;background:transparent;text-align:left;width:calc(100% - 20px);font-family:'Plus Jakarta Sans',sans-serif;}
.blk-btn:hover{background:var(--pink-soft);border-color:var(--pink-bd);}
.blk-btn:active{transform:scale(.98);}
.blk-icon{width:34px;height:34px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .15s;}
.blk-btn:hover .blk-icon{background:#fce8f3;}
.blk-name{font-size:13px;font-weight:700;color:var(--text);}
.blk-desc{font-size:11px;color:var(--muted);margin-top:1px;}

/* CANVAS */
.cv-wrap{overflow-y:auto;background:var(--bg);padding:20px 24px;}
.cv{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}
.cv-empty{min-height:360px;border:2px dashed var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--surface);color:var(--muted);}
.cv-empty-icon{font-size:32px;opacity:.4;}
.cv-empty-title{font-size:15px;font-weight:700;}
.cv-empty-sub{font-size:12px;opacity:.7;}
.cv-block{position:relative;cursor:pointer;border-radius:12px;border:2px solid transparent;overflow:hidden;transition:border-color .15s,box-shadow .15s;background:#fff;}
.cv-block:hover{border-color:var(--pink-bd);}
.cv-block.sel{border-color:var(--pink);box-shadow:0 0 0 4px var(--pink-soft);}
.cv-toolbar{position:absolute;top:8px;right:8px;display:none;gap:4px;z-index:20;}
.cv-block:hover .cv-toolbar,.cv-block.sel .cv-toolbar{display:flex;}
.tb-btn{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:rgba(255,255,255,.92);color:var(--muted);}
.tb-btn:hover{background:var(--pink-soft);color:var(--pink);}
.tb-del:hover{background:#ef4444;color:#fff;}

/* RIGHT PANEL */
.pr{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.pr-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);padding:32px 20px;text-align:center;}
.pr-empty-icon{font-size:28px;opacity:.3;}
.pr-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pr-title{font-size:13px;font-weight:700;}
.pr-body{padding:14px;display:flex;flex-direction:column;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.inp,.ta{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:#fff;outline:none;transition:border-color .15s;}
.inp:focus,.ta:focus{border-color:var(--pink);}
.inp-sm{padding:6px 9px;font-size:12px;}
.ta{resize:vertical;min-height:68px;line-height:1.55;}

/* Toggle switch */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.toggle-lbl{font-size:12px;font-weight:600;color:var(--text);}
.toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{display:block;width:40px;height:22px;background:var(--border);border-radius:100px;cursor:pointer;transition:background .2s;}
.toggle-switch input:checked + .toggle-track{background:var(--pink);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.toggle-switch input:checked ~ .toggle-thumb{transform:translateX(18px);}

/* Slider input for spacing */
.slider-field{display:flex;flex-direction:column;gap:5px;}
.slider-wrap{display:flex;align-items:center;gap:8px;}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text);min-width:28px;text-align:right;}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:4px;border-radius:100px;
  background:var(--border);outline:none;cursor:pointer;
  transition:background .15s;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:var(--pink);cursor:pointer;
  box-shadow:0 1px 4px rgba(232,50,122,.35);
  transition:transform .15s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
input[type=range]:hover{background:var(--pink-bd);}

.sep{height:1px;background:var(--border);margin:2px 0;}
.pr-group-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:4px 0 2px;}
.sub-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px;display:flex;flex-direction:column;gap:9px;}
.sub-head{display:flex;align-items:center;justify-content:space-between;}
.sub-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.rm-btn{width:20px;height:20px;border-radius:5px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.rm-btn:hover{background:#fee2e2;color:#dc2626;}
.add-btn{padding:8px;border:1.5px dashed var(--border);border-radius:9px;background:transparent;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;text-align:center;width:100%;}
.add-btn:hover{border-color:var(--pink);color:var(--pink);background:var(--pink-soft);}

/* Block reorder arrows in canvas toolbar */
.tb-btn-up,.tb-btn-dn{font-size:11px;}

/* EXPORT MODAL */
.overlay{position:fixed;inset:0;background:rgba(28,27,24,.55);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:18px;width:min(720px,96vw);max-height:92vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.18);}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-head h2{font-size:15px;font-weight:800;}
.modal-tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;}
.modal-tab{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;padding:5px 14px;border-radius:8px;border:none;cursor:pointer;color:var(--muted);background:transparent;transition:all .15s;}
.modal-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.modal-body{flex:1;overflow:auto;padding:16px 20px;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
.code-block{background:#1c1b18;color:#d4d0c8;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.7;padding:18px;border-radius:12px;white-space:pre-wrap;word-break:break-all;max-height:480px;overflow-y:auto;}

/* GLOWNY EXPORTED STYLES (also used in canvas preview) */
#glowny{-webkit-font-smoothing:antialiased;color:inherit;}
#glowny *{box-sizing:border-box;}
#glowny p,#glowny h1,#glowny h2,#glowny h3,#glowny ul,#glowny ol,#glowny li{margin:0;padding:0;list-style:none;}
#glowny img{max-width:100%;display:block;}
/* text */
#glowny .glowny-text{background:#fff;}
#glowny .glowny-text-title{font-family:'Rubik',sans-serif;font-size:clamp(26px,4vw,36px);line-height:1.15;letter-spacing:-.3px;color:#1c1b18;margin-bottom:18px;}
#glowny .glowny-text-body{font-size:15px;line-height:1.9;color:#5a5752;max-width:680px;white-space:pre-line;}
/* faq */
#glowny .glowny-faq{background:#fff;}
#glowny .glowny-faq-list{display:flex;flex-direction:column;gap:10px;}
#glowny .glowny-faq-item{background:#fff;border:1.5px solid #ede9e3;border-radius:14px;overflow:hidden;transition:border-color .2s;}
#glowny .glowny-faq-item.open{border-color:#e8327a;}
#glowny .glowny-faq-q{padding:17px 20px;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;user-select:none;color:#1c1b18;transition:color .15s;}
#glowny .glowny-faq-item.open .glowny-faq-q{color:#e8327a;}
#glowny .glowny-faq-icon{width:28px;height:28px;border-radius:50%;background:#f4f0eb;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:300;color:#8a8880;transition:transform .25s,background .2s,color .2s;line-height:1;}
#glowny .glowny-faq-item.open .glowny-faq-icon{transform:rotate(45deg);background:#fce8f3;color:#e8327a;}
#glowny .glowny-faq-a{font-size:14px;line-height:1.8;color:#7a7672;display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease;}
#glowny .glowny-faq-a-inner{overflow:hidden;padding:0 20px;}
#glowny .glowny-faq-item.open .glowny-faq-a{grid-template-rows:1fr;}
#glowny .glowny-faq-item.open .glowny-faq-a-inner{padding:0 20px 18px;}
#glowny .glowny-testi{background:#fff;}
#glowny .glowny-testi-grid{columns:3;column-gap:16px;}
#glowny .glowny-testi-card{break-inside:avoid;margin-bottom:16px;background:#fff;border:1.5px solid #ede9e3;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;}
#glowny .glowny-testi-top{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;}
#glowny .glowny-testi-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#ede9e3;display:flex;align-items:center;justify-content:center;font-size:20px;}
#glowny .glowny-testi-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
#glowny .glowny-testi-name{font-size:12px;font-weight:800;color:#343D46;line-height:1.2;}
#glowny .glowny-testi-time{font-size:16px;font-weight:600;color:#343D46;margin-top:2px;}
#glowny .glowny-testi-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;}
#glowny .glowny-testi-stars{display:none;}
#glowny .glowny-testi-text{font-size:13px;line-height:1.75;color:#3a3632;}
#glowny .glowny-testi-before-after{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
#glowny .glowny-testi-img-wrap{position:relative;overflow:hidden;}
#glowny .glowny-testi-img-wrap:first-child{border-radius:0 0 0 14px;}
#glowny .glowny-testi-img-wrap:last-child{border-radius:0 0 14px 0;}
#glowny .glowny-testi-img-wrap img{width:100%;aspect-ratio:1/1;object-fit:cover;object-position:center;display:block;height:100%;}
#glowny .glowny-testi-img-tag{position:absolute;top:7px;left:7px;background:rgba(255,255,255,.95);border-radius:100px;font-size:9px;font-weight:800;padding:3px 9px;color:#1c1b18;letter-spacing:.3px;text-transform:uppercase;}
@media(max-width:680px){#glowny .glowny-testi-grid{columns:1;}}
@media(min-width:681px) and (max-width:960px){#glowny .glowny-testi-grid{columns:2;}}
</style>
</head>
<body>

<div class="tb">
  <div class="tb-logo"><div class="tb-dot"></div>Glowny<span class="tb-tag">builder</span></div>
  <div class="tb-sp"></div>
  <div style="display:flex;align-items:center;gap:6px;">
    <span class="badge" id="saveBadge"></span>
    <button class="btn btn-primary" id="btnExport">Exportar →</button>
  </div>
</div>

<div class="layout">
  <!-- LEFT -->
  <div class="pl">
    <div class="pl-section">Seções</div>
    <button class="blk-btn" data-add="text">
      <div class="blk-icon">📝</div>
      <div><div class="blk-name">Título + Descrição</div><div class="blk-desc">Clique para adicionar</div></div>
    </button>
    <button class="blk-btn" data-add="faq">
      <div class="blk-icon">❓</div>
      <div><div class="blk-name">FAQ</div><div class="blk-desc">Clique para adicionar</div></div>
    </button>
    <button class="blk-btn" data-add="testi">
      <div class="blk-icon">💬</div>
      <div><div class="blk-name">Depoimentos</div><div class="blk-desc">Clique para adicionar</div></div>
    </button>
  </div>

  <!-- CANVAS -->
  <div class="cv-wrap" id="cvWrap">
    <div class="cv" id="canvas">
      <div class="cv-empty" id="cvEmpty">
        <div class="cv-empty-icon">✦</div>
        <div class="cv-empty-title">Clique em uma seção para começar</div>
        <div class="cv-empty-sub">Título · FAQ · Depoimentos</div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="pr">
    <div class="pr-empty" id="prEmpty">
      <div class="pr-empty-icon">🎛️</div>
      <div style="font-size:13px;font-weight:700;">Selecione uma seção</div>
      <div style="font-size:12px;margin-top:4px;">para editar o conteúdo</div>
    </div>
    <div id="prPanel" style="display:none;flex-direction:column;flex:1;overflow-y:auto;"></div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="exportModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Exportar</h2>
      <div class="modal-tabs">
        <button class="modal-tab active" id="tabHTML">HTML</button>
        <button class="modal-tab" id="tabCSS">CSS</button>
      </div>
      <button class="btn btn-ghost" id="btnCloseExport" style="padding:5px 10px;">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;" id="exportDesc">Cole o HTML e o CSS separadamente no campo de descrição da sua loja.</p>
      <div class="code-block" id="exportCode"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="btnCloseExport2">Fechar</button>
      <button class="btn btn-primary" id="btnCopy">📋 Copiar</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let blocks = [];
let selId = null;
let seq = 0;
let hist = [], histIdx = -1;
const HMAX = 60;
let exportTab = 'html';

const LBL = { text: 'Título + Descrição', faq: 'FAQ', testi: 'Depoimentos' };
const ICO = { text: '📝', faq: '❓', testi: '💬' };

const DEFS = {
  text: {
    title: 'Título do produto',
    body: 'Descreva aqui os benefícios, diferenciais e detalhes do seu produto.',
    showBody: true,
    paddingTop: 52, paddingBottom: 52, gap: 18
  },
  faq: {
    items: [
      { q: 'Como usar o produto?', a: 'Explique aqui o modo de uso.' },
      { q: 'Em quanto tempo vejo resultado?', a: 'Informe o prazo médio para resultados.' },
      { q: 'Tem garantia?', a: 'Descreva a política de garantia.' }
    ],
    paddingTop: 52, paddingBottom: 52
  },
  testi: {
    items: [
      { name: 'Priscilla Lima', time: '5 dias de tratamento', text: '"Resultado incrível! O cabelo ficou muito mais forte e brilhoso."', avatarUrl: '', beforeUrl: '', afterUrl: '' },
      { name: 'Camila Torres', time: '2 semanas de uso', text: '"Meu cabelo estava quebrando muito e depois de 2 semanas já vi uma diferença enorme."', avatarUrl: '', beforeUrl: '', afterUrl: '' },
      { name: 'Fernanda Silva', time: '1 mês de tratamento', text: '"Já virou parte da minha rotina diária. Nunca mais fico sem! 💕"', avatarUrl: '', beforeUrl: '', afterUrl: '' }
    ],
    paddingTop: 52, paddingBottom: 52
  }
};

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function snap() {
  hist = hist.slice(0, histIdx + 1);
  hist.push(JSON.stringify(blocks));
  if (hist.length > HMAX) hist.shift();
  histIdx = hist.length - 1;
}
function undo() {
  if (histIdx <= 0) return;
  histIdx--;
  blocks = JSON.parse(hist[histIdx]);
  selId = null; repaint(); renderProps();
}
function redo() {
  if (histIdx >= hist.length - 1) return;
  histIdx++;
  blocks = JSON.parse(hist[histIdx]);
  selId = null; repaint(); renderProps();
}

// ─── BLOCKS ──────────────────────────────────────────────────────────────────
function addBlock(type) {
  snap();
  const id = 'b' + (++seq);
  blocks.push({ id, type, data: JSON.parse(JSON.stringify(DEFS[type])) });
  selId = id;
  repaint(); renderProps(); save();
}
function removeBlock(id) {
  snap();
  blocks = blocks.filter(b => b.id !== id);
  if (selId === id) selId = null;
  repaint(); renderProps(); save();
}
function moveBlock(id, dir) {
  snap();
  const i = blocks.findIndex(b => b.id === id);
  if (i < 0) return;
  const ni = i + dir;
  if (ni < 0 || ni >= blocks.length) return;
  [blocks[i], blocks[ni]] = [blocks[ni], blocks[i]];
  repaint(); save();
}
function selBlock(id) {
  selId = id;
  document.querySelectorAll('.cv-block').forEach(el => el.classList.toggle('sel', el.dataset.id === id));
  renderProps();
}
function setVal(id, path, val) {
  const b = blocks.find(x => x.id === id);
  if (!b) return;
  const parts = path.split('.');
  let o = b.data;
  for (let i = 0; i < parts.length - 1; i++) o = o[parts[i]];
  o[parts[parts.length - 1]] = val;
  patchBlock(id); save();
}
function moveItem(id, idx, dir) {
  snap();
  const b = blocks.find(x => x.id === id);
  if (!b) return;
  const ni = idx + dir;
  if (ni < 0 || ni >= b.data.items.length) return;
  [b.data.items[idx], b.data.items[ni]] = [b.data.items[ni], b.data.items[idx]];
  repaint(); renderProps(); save();
}
function addItem(id, type) {
  snap();
  const b = blocks.find(x => x.id === id);
  if (!b) return;
  if (type === 'faq') b.data.items.push({ q: 'Nova pergunta', a: 'Resposta aqui.' });
  if (type === 'testi') b.data.items.push({ name: 'Nome da cliente', time: 'X dias de uso', text: '"Depoimento aqui."', avatarUrl: '', beforeUrl: '', afterUrl: '' });
  repaint(); renderProps();
}
function removeItem(id, type, i) {
  snap();
  const b = blocks.find(x => x.id === id);
  if (!b || b.data.items.length <= 1) return;
  b.data.items.splice(i, 1);
  repaint(); renderProps();
}

// ─── RENDER CANVAS ───────────────────────────────────────────────────────────
function repaint() {
  const canvas = document.getElementById('canvas');
  const empty = document.getElementById('cvEmpty');

  if (!blocks.length) {
    canvas.innerHTML = '';
    canvas.appendChild(empty);
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  const fragment = document.createDocumentFragment();
  blocks.forEach((b, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'cv-block' + (b.id === selId ? ' sel' : '');
    wrap.dataset.id = b.id;

    const toolbar = document.createElement('div');
    toolbar.className = 'cv-toolbar';

    // Move up button
    const btnUp = document.createElement('button');
    btnUp.className = 'tb-btn tb-btn-up';
    btnUp.title = 'Mover para cima';
    btnUp.textContent = '↑';
    btnUp.dataset.action = 'up';
    btnUp.dataset.id = b.id;
    if (idx === 0) btnUp.style.opacity = '0.3';
    toolbar.appendChild(btnUp);

    // Move down button
    const btnDn = document.createElement('button');
    btnDn.className = 'tb-btn tb-btn-dn';
    btnDn.title = 'Mover para baixo';
    btnDn.textContent = '↓';
    btnDn.dataset.action = 'dn';
    btnDn.dataset.id = b.id;
    if (idx === blocks.length - 1) btnDn.style.opacity = '0.3';
    toolbar.appendChild(btnDn);

    const btnDel = document.createElement('button');
    btnDel.className = 'tb-btn tb-del';
    btnDel.title = 'Remover seção';
    btnDel.textContent = '✕';
    btnDel.dataset.action = 'del';
    btnDel.dataset.id = b.id;
    toolbar.appendChild(btnDel);

    wrap.appendChild(toolbar);

    const inner = document.createElement('div');
    inner.className = 'glowny-block-inner';
    inner.setAttribute('id', 'glowny');
    inner.innerHTML = blockHTML(b);
    wrap.appendChild(inner);
    fragment.appendChild(wrap);
  });

  canvas.innerHTML = '';
  canvas.appendChild(empty);
  canvas.appendChild(fragment);
  bindFaq(canvas);
}

function patchBlock(id) {
  const el = document.querySelector(`.cv-block[data-id="${id}"]`);
  if (!el) return;
  const b = blocks.find(x => x.id === id);
  const inner = el.querySelector('.glowny-block-inner');
  if (inner) inner.innerHTML = blockHTML(b);
  bindFaq(el);
}

function bindFaq(root) {
  root.querySelectorAll('.glowny-faq-q').forEach(q => {
    q.addEventListener('click', e => {
      e.stopPropagation();
      q.closest('.glowny-faq-item').classList.toggle('open');
    });
  });
}

// ─── BLOCK HTML ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function blockHTML(b) {
  const d = b.data;
  const pt = d.paddingTop ?? 52;
  const pb = d.paddingBottom ?? 52;

  if (b.type === 'text') {
    const gap = d.gap ?? 18;
    const showBody = d.showBody !== false;
    return `<div class="glowny-text" style="padding:${pt}px 0 ${pb}px;">
      <h2 class="glowny-text-title" style="margin-bottom:${gap}px;">${esc(d.title)}</h2>
      ${showBody ? `<div class="glowny-text-body">${esc(d.body)}</div>` : ''}
    </div>`;
  }
  if (b.type === 'faq') {
    return `<div class="glowny-faq" style="padding:${pt}px 0 ${pb}px;">
      <div class="glowny-faq-list">
        ${d.items.map(it => `
          <div class="glowny-faq-item">
            <div class="glowny-faq-q">${esc(it.q)}<div class="glowny-faq-icon">+</div></div>
            <div class="glowny-faq-a"><div class="glowny-faq-a-inner">${esc(it.a)}</div></div>
          </div>`).join('')}
      </div>
    </div>`;
  }
  if (b.type === 'testi') {
    return `<div class="glowny-testi" style="padding:${pt}px 0 ${pb}px;">
      <div class="glowny-testi-grid">
        ${d.items.map(it => `
          <div class="glowny-testi-card">
            <div class="glowny-testi-top">
              <div class="glowny-testi-avatar">${it.avatarUrl ? `<img src="${esc(it.avatarUrl)}" alt="${esc(it.name)}"/>` : '👤'}</div>
              <div>
                <div class="glowny-testi-name">${esc(it.name)}</div>
                <div class="glowny-testi-time">${esc(it.time)}</div>
              </div>
            </div>
            <div class="glowny-testi-body">
              <div class="glowny-testi-text">${esc(it.text)}</div>
            </div>
            ${(it.beforeUrl||it.afterUrl) ? `<div class="glowny-testi-before-after">
              ${it.beforeUrl ? `<div class="glowny-testi-img-wrap"><img src="${esc(it.beforeUrl)}" alt="Antes"/><span class="glowny-testi-img-tag">Antes</span></div>` : ''}
              ${it.afterUrl  ? `<div class="glowny-testi-img-wrap"><img src="${esc(it.afterUrl)}" alt="Depois"/><span class="glowny-testi-img-tag">Depois</span></div>` : ''}
            </div>` : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

// ─── PROPS PANEL ─────────────────────────────────────────────────────────────
function renderProps() {
  const empty = document.getElementById('prEmpty');
  const panel = document.getElementById('prPanel');
  if (!selId) { empty.style.display='flex'; panel.style.display='none'; return; }
  const b = blocks.find(x => x.id === selId);
  if (!b) { empty.style.display='flex'; panel.style.display='none'; return; }
  empty.style.display = 'none';
  panel.style.display = 'flex';
  panel.style.flexDirection = 'column';
  panel.innerHTML = buildProps(b);

  panel.querySelectorAll('[data-path]').forEach(el => {
    const isNum = el.dataset.num === '1';
    const isRange = el.tagName === 'INPUT' && el.type === 'range';
    const isCheckbox = el.tagName === 'INPUT' && el.type === 'checkbox';
    if (isRange) {
      const valLabel = panel.querySelector(`[data-range-label="${el.dataset.path}-${el.dataset.bid}"]`);
      el.addEventListener('input', () => {
        if (valLabel) valLabel.textContent = el.value;
        setVal(el.dataset.bid, el.dataset.path, parseFloat(el.value)||0);
      });
    } else if (isCheckbox) {
      el.addEventListener('change', () => setVal(el.dataset.bid, el.dataset.path, el.checked));
    } else {
      el.addEventListener('input', () => setVal(el.dataset.bid, el.dataset.path, isNum ? (parseFloat(el.value)||0) : el.value));
    }
  });
  panel.querySelectorAll('[data-move-item]').forEach(btn => {
    btn.addEventListener('click', () => moveItem(btn.dataset.bid, parseInt(btn.dataset.idx), parseInt(btn.dataset.dir)));
  });
  panel.querySelectorAll('[data-add-item]').forEach(btn => {
    btn.addEventListener('click', () => addItem(btn.dataset.bid, btn.dataset.addItem));
  });
  panel.querySelectorAll('[data-remove-item]').forEach(btn => {
    btn.addEventListener('click', () => removeItem(btn.dataset.bid, btn.dataset.type, parseInt(btn.dataset.idx)));
  });
  panel.querySelector('[data-remove-block]')?.addEventListener('click', () => removeBlock(b.id));
}

function buildProps(b) {
  const d = b.data, id = b.id;

  const fi = (label, path, val, num=false, cls='') =>
    `<div class="field"><label class="label">${label}</label>
     <input class="inp${cls?' '+cls:''}" type="${num?'number':'text'}" value="${String(val??'').replace(/"/g,'&quot;')}"
       data-path="${path}" data-bid="${id}" ${num?'data-num="1"':''}/></div>`;

  const ta = (label, path, val) =>
    `<div class="field"><label class="label">${label}</label>
     <textarea class="ta" data-path="${path}" data-bid="${id}">${String(val??'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea></div>`;

  const sliderField = (label, path, val, min, max, step=1) => {
    const v = val ?? Math.round((min+max)/2);
    return `<div class="slider-field">
      <label class="label">${label}</label>
      <div class="slider-wrap">
        <input type="range" min="${min}" max="${max}" step="${step}" value="${v}"
          data-path="${path}" data-bid="${id}" data-num="1"/>
        <span class="slider-val" data-range-label="${path}-${id}">${v}</span>
      </div>
    </div>`;
  };

  const toggleField = (label, path, val) =>
    `<div class="toggle-row">
      <span class="toggle-lbl">${label}</span>
      <label class="toggle-switch">
        <input type="checkbox" data-path="${path}" data-bid="${id}" ${val ? 'checked' : ''}/>
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>`;

  const spacing = (showGap=false) => `
    <div class="sep"></div>
    <div class="pr-group-lbl">Espaçamento</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${sliderField('Padding top', 'paddingTop', d.paddingTop??52, 0, 120)}
      ${sliderField('Padding bottom', 'paddingBottom', d.paddingBottom??52, 0, 120)}
      ${showGap ? sliderField('Gap título/descrição', 'gap', d.gap??18, 0, 80) : ''}
    </div>`;

  let h = `<div class="pr-head">
    <div class="pr-title">${ICO[b.type]} ${LBL[b.type]}</div>
    <button class="btn btn-ghost" style="padding:4px 9px;font-size:11px;" data-remove-block="1">Remover</button>
  </div><div class="pr-body">`;

  if (b.type === 'text') {
    h += fi('Título', 'title', d.title);
    h += toggleField('Exibir descrição', 'showBody', d.showBody !== false);
    if (d.showBody !== false) {
      h += ta('Descrição', 'body', d.body);
    }
    h += spacing(true);
  }

  if (b.type === 'faq') {
    d.items.forEach((it, i) => {
      h += `<div class="sub-card">
        <div class="sub-head"><span class="sub-lbl">Pergunta ${i+1}</span>
          <div style="display:flex;gap:3px;align-items:center;">
            <button class="rm-btn" data-move-item="1" data-bid="${id}" data-type="faq" data-idx="${i}" data-dir="-1">↑</button>
            <button class="rm-btn" data-move-item="1" data-bid="${id}" data-type="faq" data-idx="${i}" data-dir="1">↓</button>
            <button class="rm-btn" data-remove-item="1" data-bid="${id}" data-type="faq" data-idx="${i}">✕</button>
          </div>
        </div>
        ${fi('Pergunta', `items.${i}.q`, it.q)}
        ${ta('Resposta', `items.${i}.a`, it.a)}
      </div>`;
    });
    h += `<button class="add-btn" data-add-item="faq" data-bid="${id}">＋ Adicionar pergunta</button>`;
    h += spacing(false);
  }

  if (b.type === 'testi') {
    d.items.forEach((it, i) => {
      h += `<div class="sub-card">
        <div class="sub-head"><span class="sub-lbl">Depoimento ${i+1}</span>
          <div style="display:flex;gap:3px;align-items:center;">
            <button class="rm-btn" data-move-item="1" data-bid="${id}" data-type="testi" data-idx="${i}" data-dir="-1">↑</button>
            <button class="rm-btn" data-move-item="1" data-bid="${id}" data-type="testi" data-idx="${i}" data-dir="1">↓</button>
            <button class="rm-btn" data-remove-item="1" data-bid="${id}" data-type="testi" data-idx="${i}">✕</button>
          </div>
        </div>
        ${fi('Nome', `items.${i}.name`, it.name)}
        ${fi('Tempo de uso', `items.${i}.time`, it.time)}
        ${ta('Depoimento', `items.${i}.text`, it.text)}
        ${fi('URL avatar', `items.${i}.avatarUrl`, it.avatarUrl)}
        ${fi('URL foto Antes', `items.${i}.beforeUrl`, it.beforeUrl)}
        ${fi('URL foto Depois', `items.${i}.afterUrl`, it.afterUrl)}
      </div>`;
    });
    h += `<button class="add-btn" data-add-item="testi" data-bid="${id}">＋ Adicionar depoimento</button>`;
    h += spacing(false);
  }

  h += '</div>';
  return h;
}

  return `/* ── Glowny Builder — início ── */

#glowny .glowny-faq-item.open .glowny-faq-q{color:#e8327a;}

function buildExportHTML() {
  const body = blocks.map(b => `<div id="glowny">\n${blockHTML(b)}\n</div>`).join('\n');
  const hasFaq = blocks.some(b => b.type === 'faq');
  const script = hasFaq
    ? `\n<script>document.querySelectorAll('#glowny .glowny-faq-q').forEach(function(q){q.addEventListener('click',function(){q.closest('.glowny-faq-item').classList.toggle('open');});});<\/script>`
    : '';
  return `<!-- Glowny Builder — início -->\n` + body + script + `\n<!-- Glowny Builder — fim -->`;
}

function refreshExportModal() {
  const code = document.getElementById('exportCode');
  const desc = document.getElementById('exportDesc');
  if (exportTab === 'html') {
    code.textContent = buildExportHTML();
    desc.textContent = 'Cole este HTML no campo de descrição da sua loja.';
  } else {
    code.textContent = buildExportCSS();
    desc.textContent = 'Cole este CSS no campo de estilos customizados da sua loja.';
  }
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
let saveTimer = null;
function save() {
  const badge = document.getElementById('saveBadge');
  badge.textContent = '● não salvo'; badge.className = 'badge dirty';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem('glowny_b', JSON.stringify(blocks)); localStorage.setItem('glowny_s', seq); } catch(e){}
    badge.textContent = '✓ Salvo'; badge.className = 'badge saved';
  }, 1400);
}
function loadSaved() {
  try {
    const r = localStorage.getItem('glowny_b');
    if (r) { blocks = JSON.parse(r); seq = parseInt(localStorage.getItem('glowny_s')||'0'); }
  } catch(e){}
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.blk-btn[data-add]').forEach(btn => {
  btn.addEventListener('click', () => addBlock(btn.dataset.add));
});

document.getElementById('canvas').addEventListener('click', e => {
  const btn = e.target.closest('.tb-btn');
  if (btn) {
    e.stopPropagation();
    const action = btn.dataset.action;
    const id = btn.dataset.id;
    if (action === 'del') removeBlock(id);
    if (action === 'up') { selId = id; moveBlock(id, -1); }
    if (action === 'dn') { selId = id; moveBlock(id, 1); }
    return;
  }
  const block = e.target.closest('.cv-block');
  if (block) { selBlock(block.dataset.id); return; }
  selId = null;
  document.querySelectorAll('.cv-block').forEach(el => el.classList.remove('sel'));
  renderProps();
});

document.getElementById('btnExport').addEventListener('click', () => {
  if (!blocks.length) { alert('Adicione pelo menos uma seção antes de exportar.'); return; }
  exportTab = 'html';
  document.getElementById('tabHTML').classList.add('active');
  document.getElementById('tabCSS').classList.remove('active');
  refreshExportModal();
  document.getElementById('exportModal').classList.add('open');
});

document.getElementById('tabHTML').addEventListener('click', () => {
  exportTab = 'html';
  document.getElementById('tabHTML').classList.add('active');
  document.getElementById('tabCSS').classList.remove('active');
  refreshExportModal();
});
document.getElementById('tabCSS').addEventListener('click', () => {
  exportTab = 'css';
  document.getElementById('tabCSS').classList.add('active');
  document.getElementById('tabHTML').classList.remove('active');
  refreshExportModal();
});

document.getElementById('btnCloseExport').addEventListener('click', () => document.getElementById('exportModal').classList.remove('open'));
document.getElementById('btnCloseExport2').addEventListener('click', () => document.getElementById('exportModal').classList.remove('open'));
document.getElementById('exportModal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

document.getElementById('btnCopy').addEventListener('click', () => {
  const text = exportTab === 'html' ? buildExportHTML() : buildExportCSS();
  navigator.clipboard.writeText(text).then(() => {
    const b = document.getElementById('btnCopy');
    b.textContent = '✅ Copiado!';
    setTimeout(() => b.textContent = '📋 Copiar', 2000);
  });
});

document.addEventListener('keydown', e => {
  const c = e.ctrlKey || e.metaKey;
  if (c && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if (c && (e.key === 'y' || (e.key==='z'&&e.shiftKey))) { e.preventDefault(); redo(); }
  if (e.key === 'Escape') document.getElementById('exportModal').classList.remove('open');
});

// ─── INIT ────────────────────────────────────────────────────────────────────
loadSaved();
snap();
repaint();
renderProps();
</script>
